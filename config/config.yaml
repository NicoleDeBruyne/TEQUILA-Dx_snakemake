# ---------------------------------------------------------------------------
# RNA-Dx Pipeline Configuration
# Edit paths and thresholds to match your environment.
# Boolean flags can be overridden at the CLI with --config key=True/False
#
# See docs/general.md for how this file is structured and how the pipeline
# stages fit together, and docs/setup.md for where the default resource
# paths below come from.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Run manifest (injected at runtime by submit_snakemake.sh)
# Each sample entry provides: bam, outdir, bed, tissues, sample_type
# ("sample_type" is used only by the merge_hits stage, to group samples
#  sharing the same BED panel and sample type, e.g. "fibroblasts", "PBMC")
# ---------------------------------------------------------------------------
run: ""   # path to the per-run YAML generated by submit_snakemake.sh

# ---------------------------------------------------------------------------
# Pipeline stage booleans -- one flag per rules/*.smk file, named to match
# the file's stem, EXCEPT rules/1_call_variants.smk: its four variant
# callers can each be toggled independently, so it gets one flag per
# caller (longcallr/nanots/clair3_rna/deepvariant) instead of one flag for
# the whole file. Each flag otherwise gates that file's whole internal rule
# chain as a unit (e.g. junction_analysis covers _5A_get_junction_counts ->
# _5B_perform_binomial_tests -> _5C_identify_junction_outliers together).
#
# NOTE: an upstream flag being off does NOT stop that file's rule(s) from
# running if a downstream flag is on and needs their output (e.g.
# compile_variants=false won't skip variant calling if merge_hits=true).
# See docs/general.md for details.
# ---------------------------------------------------------------------------
longcallr:                 true
nanots:                    true
clair3_rna:                true
deepvariant:               true
compile_variants:          true
phase_reads:               true
ase_analysis:               true
junction_analysis:          true
cohort_junction_analysis:   true
merge_hits:                 true
validate_sample_types:      true

# ---------------------------------------------------------------------------
# Shared conda environments. conda_env is used by every rule except
# compile_variants, which needs conda_env_compile_variants instead (see
# docs/setup.md and docs/rules/2_compile_variants.md for why).
# ---------------------------------------------------------------------------
conda_env:        "envs/conda_env"
conda_env_compile_variants: "envs/conda_env_compile_variants"

# ---------------------------------------------------------------------------
# Reference files (GENCODE) -- used starting with the variant callers below,
# and throughout most other stages.
# Relative paths here (and for every resource below) resolve against the
# pipeline directory itself, i.e. snakemake/resources/... -- see
# docs/general.md. Use an absolute path instead to point at a shared copy.
# ---------------------------------------------------------------------------
genome:     "resources/gencode_data/GRCh38.primary_assembly.genome.fa"
annotation: "resources/gencode_data/gencode.v44.primary_assembly.annotation.gtf"

# ---------------------------------------------------------------------------
# Variant callers (rules/1_call_variants.smk -- longcallR, NanoTS,
# Clair3-RNA, DeepVariant)
# ---------------------------------------------------------------------------
longcallr_bin:    "envs/conda_env/bin/longcallR"
nanots_image:     "library://zelinliu/nanots/nanots:1.0.0"
nanots_model_unphased: "resources/NanoTS/model/unphased_cDNA_nanopore_R104_HG002.pth"
nanots_model_phased:   "resources/NanoTS/model/phased_cDNA_nanopore_R104_HG002.pth"
clair3_rna_image: "docker://hkubal/clair3-rna:v0.2.2"
deepvariant_image: "docker://google/deepvariant:1.6.1"

# ---------------------------------------------------------------------------
# Variant compilation / annotation (rules/2_compile_variants.smk)
# Merges the four callers' VCFs and annotates with gnomAD, ClinVar,
# ANNOVAR, CADD, and SpliceAI.
#
# gnomad_base/gnomad_mito_vcf/clinvar_vcf default to local copies under
# resources/gnomad_data/ and resources/clinvar_data/, downloaded by
# setup_resources.sh (gnomAD ~300GB+, ClinVar ~200MB).
#
# Alternative: point these at their public HTTPS URLs instead, and
# compile_variants queries them remotely, restricted to your BED panel.
# Shortcut: set gnomad_base / clinvar_vcf / cadd_script to the literal
# string "remote" and the Snakefile substitutes the canonical public URL
# automatically.
#
# Full fallback-tier behavior (local -> local pre-scored -> remote) for
# CADD/SpliceAI, and the outbound-HTTPS caveat for remote lookups on SLURM
# compute nodes, is documented in docs/rules/2_compile_variants.md.
# ---------------------------------------------------------------------------
gnomad_base:         "resources/gnomad_data"
clinvar_vcf:         "resources/clinvar_data/clinvar.vcf.gz"
annovar_dir:         "resources/annovar"
# Points at CADD_wrapper.sh (generated by setup_resources.sh), NOT CADD.sh
# directly -- see docs/setup.md and docs/rules/2_compile_variants.md.
cadd_script:       "resources/CADD-scripts-1.7.1/CADD_wrapper.sh"
# Must live alongside cadd_script, as CADD-scripts' own <install_dir>/data.
cadd_data_dir:       "resources/CADD-scripts-1.7.1/data"
# Local pre-scored CADD files (second-tier fallback). Either can be left
# empty to skip that variant type at this tier.
cadd_local_prescored_snv:   "resources/CADD-scripts-1.7.1/data/prescored/GRCh38_v1.7/no_anno/whole_genome_SNVs.tsv.gz"
cadd_local_prescored_indel: "resources/CADD-scripts-1.7.1/data/prescored/GRCh38_v1.7/no_anno/gnomad.genomes.r4.0.indel.tsv.gz"
# Public pre-scored CADD SNV lookup (last-resort fallback, SNVs only).
cadd_prescored_url:  "https://krishna.gs.washington.edu/download/CADD/v1.7/GRCh38/whole_genome_SNVs.tsv.gz"

# SpliceAI is run live via the bioconda `spliceai` package by default.
# "grch38"/"grch37" selects SpliceAI's own bundled GENCODE-based annotation.
spliceai_annotation: "grch38"

# Empty by default -- SpliceAI's precomputed genome-wide score files need a
# BaseSpace-gated download (see docs/setup.md) and aren't auto-downloaded.
# If set, these are used as a fallback if the live spliceai run fails or no
# genome FASTA is configured. Providing only one scores only that variant
# type via fallback. Use the MASKED (not raw) hg38 files -- see
# docs/setup.md for why -- and keep both consistent with each other.
spliceai_prescored_snv_vcf:   ""
spliceai_prescored_indel_vcf: ""

# false by default -- live spliceai scoring is tried first whenever a genome
# FASTA is configured. Set true to skip the live run and always use the
# prescored lookup instead. Has no effect if neither prescored VCF above is set.
spliceai_force_prescored_lookup: false

gnomad_chroms:
  - chr1
  - chr2
  - chr3
  - chr4
  - chr5
  - chr6
  - chr7
  - chr8
  - chr9
  - chr10
  - chr11
  - chr12
  - chr13
  - chr14
  - chr15
  - chr16
  - chr17
  - chr18
  - chr19
  - chr20
  - chr21
  - chr22
  - chrX
  - chrY
# chrM uses gnomAD v3.1 -- handled separately in compile_variants rule.
# Follows gnomad_base's local/remote choice automatically.
gnomad_mito_vcf: "resources/gnomad_data/gnomad.genomes.v3.1.sites.chrM.vcf.bgz"

# CADD's own pre-filter -- independent of gnomad_af_threshold/clnsig_filter
# below (which drive the FINAL overall variant filter), but defaulted to
# match them out of the box.
cadd_gnomad_af_threshold: 0.01
cadd_clnsig_filter:
  - "Benign"
  - "Likely_benign"
  - "Benign/Likely_benign"
cadd_threshold:         15   # final CADD PHRED filter

# Pre-filter threshold for which variants SpliceAI actually gets run on.
# Independent of gnomad_af_threshold/clnsig_filter below, defaulted to
# match out of the box, but changeable separately.
spliceai_gnomad_af_threshold: 0.01
spliceai_clnsig_filter:
  - "Benign"
  - "Likely_benign"
  - "Benign/Likely_benign"
spliceai_threshold:     0.2   # final SpliceAI score filter

# compile_variants.py's final overall variant filter.
gnomad_af_threshold:    0.01
clnsig_filter:
  - "Benign"
  - "Likely_benign"
  - "Benign/Likely_benign"

# compile_variants.py's final-stage depth/allele-frequency filters. Empty
# string ("") means "don't apply this filter" -- set a number to enable it.
final_dp_threshold: ""
final_af_threshold: ""

# ---------------------------------------------------------------------------
# Read phasing (rules/3_phase_reads.smk)
# Builds a merged VCF from all four callers, then runs WhatsHap-based
# per-gene phasing.
# ---------------------------------------------------------------------------
phasing_threshold:      0.5   # min proportion of a read's coverage that must phase to haplotypes to be used
terminal_variant_proportion: 0.5   # proportion of a read's length from its end considered "terminal"
min_dist_from_read_end_variant_phasing: 20   # min distance (bp) from a read's end for a variant to be used in phasing

# ---------------------------------------------------------------------------
# Allele-specific expression analysis (rules/4_ase_analysis.smk)
# Binomial test for ASE per gene from phased haplotype counts.
# ---------------------------------------------------------------------------
# Also used by junction_analysis.smk and cohort_junction_analysis.smk.
sample_coverage_threshold: 20
# Also used by junction_analysis.smk, merge_hits.smk (as the padj:delta pair
# for outlier calling), and cohort_junction_analysis.smk for groups using
# beta_binomial (ignored for groups using modified_zscore -- see
# cohort_jxn_method below).
padj_threshold:         0.05
haplotype_ratio_threshold: 0.1
# Min fraction of max coverage phased to haplotypes for an ASE call to be trusted.
ase_phasing_threshold:  0.5

# ---------------------------------------------------------------------------
# Splice junction outlier analysis vs. GTEx reference tissues
# (rules/5_junction_analysis.smk)
# ---------------------------------------------------------------------------
gtex_data_dir: "resources/gtex_data"
gtex_coverage_threshold:   20
gtex_n_threshold:          100
# Also used by cohort_junction_analysis.smk below (as delta_psi_threshold)
# for groups using beta_binomial (ignored for groups using modified_zscore,
# which uses cohort_jxn_z_threshold instead).
delta_psi_threshold:    0.1
jxn_phasing_threshold:  0.8   # min fraction of bulk coverage a junction's hap1+hap2 must reach to be trusted

# ---------------------------------------------------------------------------
# Cohort-level junction outlier analysis (rules/7_cohort_junction_analysis.smk)
# Computes per-junction coverage/usage metrics across a (bed, sample_type)
# group's own bulk BAMs (rather than GTEx reference tissues), fits a
# per-junction reference distribution from the cohort's bulk samples, then
# flags per-sample outliers. Two statistical methods are available:
#   "beta_binomial"    -- fits a Beta distribution per junction, tests each
#                          sample with a beta-binomial test, FDR-corrects
#                          across the whole cohort. Outlier = padj_threshold/
#                          delta_psi_threshold above.
#   "modified_zscore"  -- takes the median/MAD of each junction's rescaled
#                          value across bulk samples; outlier = |modZ| >=
#                          cohort_jxn_z_threshold. No p-values/FDR involved.
# cohort_jxn_method picks between them:
#   "auto" (default) -- per group, beta_binomial if the group has >=
#                        cohort_jxn_beta_min_samples bulk samples, else
#                        modified_zscore. A per-junction Beta distribution
#                        needs enough bulk samples to fit meaningfully;
#                        smaller cohorts fall back to the median/MAD
#                        approach instead.
#   "beta_binomial" / "modified_zscore" -- force that one method for every
#                        group regardless of size.
# Groups with fewer than cohort_jxn_min_samples samples are skipped entirely,
# regardless of cohort_jxn_method (a note explaining why is written alongside
# that group's other output -- see rules/7_cohort_junction_analysis.smk's
# `note` output) -- this is a lower, separate floor below which neither
# method is meaningful at all.
# ---------------------------------------------------------------------------
cohort_jxn_min_samples:        10   # groups with fewer bulk samples than this are skipped entirely
cohort_jxn_method:       "auto"     # "auto", "beta_binomial", or "modified_zscore"
cohort_jxn_beta_min_samples:   30   # "auto" only: beta_binomial at/above this sample count, else modified_zscore
cohort_jxn_z_threshold:       3.5   # modified_zscore only: |modZ| >= this value flags an outlier
cohort_jxn_phasing_threshold: 0.8   # min fraction of bulk coverage a junction's hap1+hap2 must reach to be trusted
cohort_jxn_n_threshold:        30   # min number of bulk samples with usable coverage before fitting a junction's reference distribution
cohort_jxn_min_reads:          20   # a junction needs >= this many reads in >=1 bulk sample to be tested at all

# ---------------------------------------------------------------------------
# Cross-sample merge stage (rules/6_merge_hits.smk)
# ---------------------------------------------------------------------------
merged_outdir: ""   # top-level directory for cross-sample merged results; one
                     # subdirectory per (bed, sample_type) group is created beneath it
omim_file: "resources/omim_data/OMIM.tsv"

merge_num_callers_threshold_snv:       2
merge_num_callers_threshold_indel:     2
merge_min_dp_snv:                     20
merge_min_dp_indel:                   20
merge_variant_sample_fraction:         0.05   # a variant present in > this fraction of a group's samples is dropped

merge_min_haplotype_ratio:             0.1
merge_delta_haplotype_ratio_threshold: 0.2
merge_ase_padj_threshold:              0.001
merge_ase_sample_fraction:             0.05   # a gene with ASE in > this fraction of a group's samples is dropped

merge_jxn_coverage_threshold:         50
merge_jxn_padj_threshold:              0.001
merge_delta_psi_threshold:             0.2
merge_jxn_sample_fraction:              0.01  # a junction that's an outlier in > this fraction of a group's samples is dropped

# ---------------------------------------------------------------------------
# Sample-type validation stage (rules/8_validate_sample_types.smk)
# Compares each (bed, sample_type) group's junction profile against GTEx
# reference-tissue matrices to flag any mislabeled sample_type.
# ---------------------------------------------------------------------------
validate_ref_tissues: ["fibroblasts", "lymphocytes", "wholeblood"]
validate_ref_colors:  ["#D95D5B", "#57AA3E", "#B271AB"]

# Optional: explicit color per sample_type for validate_sample_types plots.
# Any sample_type not listed here gets a color auto-assigned from a default
# palette (see sample_type_color() in the Snakefile).
sample_type_colors:
  fibroblasts: "#D95D5B"
  lymphocytes: "#57AA3E"
  PBMCs: "#4C8FCA"
  wholeblood: "#B271AB"

# ---------------------------------------------------------------------------
# Resource defaults (override per rule if needed)
# ---------------------------------------------------------------------------
threads: 8
time:    1440   # default runtime in MINUTES, used as resources.runtime in each rule
                # (converted to HH:MM:SS for sbatch --time inside the --cluster
                # template in submit_snakemake.sh)

# Node exclusion is applied uniformly via the --cluster sbatch template in
# submit_snakemake.sh (EXCLUDE_NODES variable), not from this config file.
