# ---------------------------------------------------------------------------
# RNA-Dx Pipeline Configuration
# Edit paths and thresholds to match your environment.
# Boolean flags can be overridden at the CLI with --config key=True/False
#
# Paths below are defaults for a self-contained deployment (see
# setup_resources.sh in this directory). Relative paths resolve against the
# pipeline directory itself at runtime (see _BUNDLED_PATH_KEYS in the
# Snakefile); use an absolute path here to point at an existing/shared copy
# instead.
#
# Sections below are ordered to roughly follow the order rules actually run
# in: run manifest -> stage toggles -> shared environments -> reference data
# -> variant callers (longcallr/nanots/clair3_rna/deepvariant) ->
# compile_variants -> phase_reads -> ase_analysis -> junction_analysis ->
# cohort_junction_analysis -> merge_hits -> validate_sample_types ->
# resource defaults. A handful of thresholds are shared across multiple
# stages (e.g. padj_threshold, sample_coverage_threshold) -- each such key
# is defined once, at its first point of use, with a comment noting where
# else it's reused.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Run manifest (injected at runtime by submit_snakemake.sh)
# Each sample entry provides: bam, outdir, bed, tissues, sample_type
# ("sample_type" is used only by the merge_hits stage, to group samples
#  sharing the same BED panel and sample type, e.g. "fibroblasts", "PBMC")
# ---------------------------------------------------------------------------
run: ""   # path to the per-run YAML generated by submit_snakemake.sh

# ---------------------------------------------------------------------------
# Pipeline stage booleans -- one flag per rules/*.smk file, named to match
# the file's stem. Each flag gates that file's whole internal rule chain as
# a unit (e.g. junction_analysis covers get_junction_counts ->
# perform_binomial_tests -> identify_junction_outliers together).
#
# NOTE: Snakemake resolves its DAG from requested output files, not from
# these flags -- so an upstream flag being off does NOT stop that file's
# rule(s) from running if a downstream flag is on and needs their output
# (e.g. compile_variants=false won't skip variant calling if merge_hits=true,
# since merge_hits needs compile_variants' output).
# ---------------------------------------------------------------------------
longcallr:                 true
nanots:                    true
clair3_rna:                true
deepvariant:               true
compile_variants:          true
phase_reads:               true
ase_analysis:               true
junction_analysis:          true
cohort_junction_analysis:   true
merge_hits:                 true
validate_sample_types:      true

# ---------------------------------------------------------------------------
# Shared conda environments (used across most rules -- see per-stage
# sections below for tool-specific images/binaries instead).
# ---------------------------------------------------------------------------
conda_env:        "envs/conda_env"
# Dedicated env for the compile_variants rule only, built from
# environment_compile_variants.yaml (see setup_resources.sh's CADD-scripts
# section) -- identical to conda_env above except for its Snakemake version
# (>=8.25.2, not 7.x) and its extra dependencies (perl/htslib/pysam/
# spliceai/etc. -- see environment_compile_variants.yaml). Needed because
# compile_variants.py itself must run under this env's Python, and
# directly shells out to several of its other tools (ANNOVAR's perl,
# bcftools/tabix/bgzip, spliceai). rules/compile_variants.smk activates
# this env (not conda_env) for just that one rule's shell command.
#
# Its Snakemake >=8.25.2 is also where CADD_wrapper.sh (see cadd_script
# below) gets the `snakemake` binary CADD.sh's own conda mode needs for
# its internal `snakemake --sdm conda ...` call (--sdm is a Snakemake
# 8.0+-only flag conda_env's 7.x, pinned for the classic cluster/
# cluster-status profile syntax used elsewhere, doesn't understand) -- but
# the wrapper gets it via a self-contained shim, not by inheriting this
# env's PATH wholesale, to avoid its other tools (particularly its own
# `perl`) leaking into CADD.sh's own per-rule conda environments. See
# setup_resources.sh's CADD-scripts section for the full story.
# compile_variants.py itself knows nothing about any of this environment
# management -- only CADD_wrapper.sh and this rule's shell command do.
conda_env_compile_variants: "envs/conda_env_compile_variants"
# singularity_binds is no longer a static config value -- rules/nanots.smk,
# clair3_rna.smk, and deepvariant.smk each compute bind directories
# dynamically per job (see _bind_dirs), from whatever BAM/genome/model
# files that rule actually needs, so paths don't need to match wherever
# this was originally configured.

# ---------------------------------------------------------------------------
# Reference files (GENCODE) -- used starting with the variant callers below,
# and throughout most other stages.
# Relative paths here are resolved against the pipeline directory itself
# (see _BUNDLED_PATH_KEYS in the Snakefile), i.e. snakemake/resources/... --
# same as every other resource below. Set an absolute path instead if your
# genome build lives somewhere else entirely.
# ---------------------------------------------------------------------------
genome:     "resources/gencode_data/GRCh38.primary_assembly.genome.fa"
annotation: "resources/gencode_data/gencode.v44.primary_assembly.annotation.gtf"

# ---------------------------------------------------------------------------
# Variant callers (rules/longcallr.smk, nanots.smk, clair3_rna.smk,
# deepvariant.smk)
# ---------------------------------------------------------------------------
longcallr_bin:    "envs/conda_env/bin/longcallR"
nanots_image:     "library://zelinliu/nanots/nanots:1.0.0"
nanots_model_unphased: "resources/NanoTS/model/unphased_cDNA_nanopore_R104_HG002.pth"
nanots_model_phased:   "resources/NanoTS/model/phased_cDNA_nanopore_R104_HG002.pth"
clair3_rna_image: "docker://hkubal/clair3-rna:v0.2.2"
deepvariant_image: "docker://google/deepvariant:1.6.1"

# ---------------------------------------------------------------------------
# Variant compilation / annotation (rules/compile_variants.smk)
# Merges the four callers' VCFs and annotates with ANNOVAR, gnomAD,
# ClinVar, CADD, and SpliceAI.
#
# gnomad_base/gnomad_mito_vcf/clinvar_vcf default to local copies under
# resources/gnomad_data/ and resources/clinvar_data/, downloaded by
# setup_resources.sh (gnomAD ~300GB+, ClinVar ~200MB).
#
# Alternative: point these at their public HTTPS URLs instead, and
# compile_variants queries them remotely, restricted to your BED panel
# (`bcftools view -R <bed> <url>`), fetching only the byte ranges it needs
# rather than requiring a local copy:
#   gnomad_base:     "https://storage.googleapis.com/gcp-public-data--gnomad/release/4.1/vcf/genomes"
#   gnomad_mito_vcf: "https://storage.googleapis.com/gcp-public-data--gnomad/release/3.1/vcf/genomes/gnomad.genomes.v3.1.sites.chrM.vcf.bgz"
#   clinvar_vcf:     "https://ftp.ncbi.nlm.nih.gov/pub/clinvar/vcf_GRCh38/clinvar.vcf.gz"
#
# Shortcut: set gnomad_base / clinvar_vcf / cadd_script to the literal
# string "remote" instead of writing out the URL -- the Snakefile
# substitutes the canonical public URL automatically. This explicitly says
# "don't use the local install, even if one exists" -- useful for testing
# before running setup_resources.sh, or comparing local vs. remote results.
# gnomad_mito_vcf has no "remote" sentinel of its own here -- it just
# follows gnomad_base.
# For cadd_script, "remote" means: skip the local CADD-scripts run entirely
# and fall straight to the local pre-scored lookup (cadd_local_prescored_snv/
# cadd_local_prescored_indel below), then the remote pre-scored SNV lookup
# (cadd_prescored_url) if that isn't configured either -- see run_CADD.
#
# Default behavior (local paths configured): try the local copy/run first,
# and fall back automatically if it's missing/unindexed or a query/run
# fails at runtime -- see compile_variants.py's extract_gnomAD_AF/
# extract_CLNSIG/run_CADD. CADD specifically has three tiers: local
# CADD-scripts run -> local pre-scored lookup -> remote pre-scored lookup
# (SNVs only at that last tier). SpliceAI similarly tries the live spliceai
# tool first (if a genome FASTA is configured), then falls back to
# spliceai_prescored_snv_vcf/spliceai_prescored_indel_vcf if that fails or
# isn't configured -- see run_SpliceAI.
#
# Caveat: any remote lookup needs outbound HTTPS from your SLURM compute
# nodes -- many HPC clusters block or restrict this (HTTP/2 framing errors
# have shown up even where plain HTTPS works). Test with
# `curl -sI --http1.1 <url>` from an actual compute node, or submit
# test_remote_annotation_access.sh, before relying on this.
# ---------------------------------------------------------------------------
gnomad_base:         "resources/gnomad_data"
clinvar_vcf:         "resources/clinvar_data/clinvar.vcf.gz"
annovar_dir:         "resources/annovar"
# CADD runs via CADD-scripts' own conda mode (CADD.sh -m, invoked through
# CADD_wrapper.sh -- cadd_script below) rather than the Singularity
# container this pipeline used previously. CADD.sh's conda mode shells out
# to its own internal `snakemake --sdm conda ...` call, which needs
# Snakemake >=8.25.2 already on PATH just to launch. cadd_script points at
# CADD_wrapper.sh, not CADD.sh directly -- the wrapper (generated by
# setup_resources.sh alongside CADD.sh) takes care of making a suitable
# `snakemake` available on PATH without leaking conda_env_compile_variants's
# other tooling (its own `perl`, in particular) into CADD.sh's per-rule
# conda environments, where it can otherwise silently shadow a rule's own
# perl if that rule's env doesn't bundle a dedicated one -- see
# setup_resources.sh's CADD-scripts section for the full story. Keeping
# this environment-specific logic in the wrapper (rather than in
# compile_variants.py itself) keeps that script portable / runnable
# outside Snakemake.
# CADD_wrapper.sh (generated by setup_resources.sh alongside CADD.sh) --
# NOT CADD.sh directly. The wrapper runs CADD-scripts' own conda envs
# (-m flag) via CADD.sh, but takes care of its Snakemake >=8.25.2
# requirement itself (see the comment above) rather than relying on
# whatever's already on PATH when compile_variants.py invokes it --
# nothing CADD-specific needed here.
cadd_script:       "resources/CADD-scripts-1.7.1/CADD_wrapper.sh"
# cadd_data_dir must live alongside cadd_script as CADD-scripts' own
# <install_dir>/data (CADD.sh finds it relative to itself, regardless of
# whether it's invoked directly or through the wrapper).
cadd_data_dir:       "resources/CADD-scripts-1.7.1/data"
# Local pre-scored CADD files, downloaded alongside cadd_data_dir by
# setup_resources.sh. Used as the second-tier CADD fallback (after a local
# CADD-scripts run, before the remote pre-scored URL below) -- see
# compile_variants.py's run_CADD. SNV file covers SNVs; InDel file covers
# InDels; either can be left empty to skip that variant type at this tier
# (falling through to the next tier instead, for SNVs -- InDels have no
# further fallback since cadd_prescored_url is SNV-only).
cadd_local_prescored_snv:   "resources/CADD-scripts-1.7.1/data/prescored/GRCh38_v1.7/no_anno/whole_genome_SNVs.tsv.gz"
cadd_local_prescored_indel: "resources/CADD-scripts-1.7.1/data/prescored/GRCh38_v1.7/no_anno/gnomad.genomes.r4.0.indel.tsv.gz"
# Public pre-scored CADD SNV lookup (remote tabix byte-range query -- see
# above). Always passed to compile_variants.py: it's the last-resort
# fallback if a local CADD run and the local pre-scored lookup both fail
# (or aren't configured) at runtime. SNVs only -- InDels get CADD_PHRED "."
# whenever this ends up being the source actually used.
cadd_prescored_url:  "https://krishna.gs.washington.edu/download/CADD/v1.7/GRCh38/whole_genome_SNVs.tsv.gz"

# SpliceAI is run live via the bioconda `spliceai` package on the small
# variant set that survives compile_variants.py's filtering, by default.
# "grch38"/"grch37" selects SpliceAI's own bundled GENCODE-based annotation;
# not a path, so not in _BUNDLED_PATH_KEYS.
spliceai_annotation: "grch38"

# Empty by default -- SpliceAI's precomputed genome-wide score files need a
# BaseSpace-gated download and can't be auto-downloaded (see
# setup_resources.sh), so this pipeline assumes they're not available. The
# live spliceai tool is always tried first (as long as a genome FASTA is
# configured and spliceai_force_prescored_lookup below isn't set); if
# either of these is set (SNV and InDel are separate files from Illumina),
# compile_variants.py falls back to a lookup against whichever is provided
# if the live run fails at runtime, or if no genome FASTA is configured at
# all -- see run_SpliceAI's dispatch logic. Providing only one means only
# that variant type gets scored via lookup fallback; the other gets "."
# (no fallback for just the missing one, by design). Use the MASKED (not
# raw) hg38 files -- see setup_resources.sh's SpliceAI section and
# run_SpliceAI_chunk's `-M 1` for why -- and keep both consistent with
# each other.
spliceai_prescored_snv_vcf:   ""
spliceai_prescored_indel_vcf: ""

# false by default -- live spliceai scoring is tried first whenever a genome
# FASTA is configured, and the prescored VCFs above (if given) are only a
# fallback for if that live run fails. Set this to true to skip the live
# run outright and always go straight to the prescored lookup instead --
# e.g. to save the compute cost of live (TensorFlow-based) scoring when
# you already know the prescored files cover your variant set. Has no
# effect if neither prescored VCF above is set -- SpliceAI just falls
# through to "fail" the same as an unconfigured, failed live run would.
spliceai_force_prescored_lookup: false

gnomad_chroms:
  - chr1
  - chr2
  - chr3
  - chr4
  - chr5
  - chr6
  - chr7
  - chr8
  - chr9
  - chr10
  - chr11
  - chr12
  - chr13
  - chr14
  - chr15
  - chr16
  - chr17
  - chr18
  - chr19
  - chr20
  - chr21
  - chr22
  - chrX
  - chrY
# chrM uses gnomAD v3.1 — handled separately in compile_variants rule.
# No "remote" sentinel of its own here -- it follows gnomad_base's
# local/remote choice automatically (see the comment on gnomad_base above).
gnomad_mito_vcf: "resources/gnomad_data/gnomad.genomes.v3.1.sites.chrM.vcf.bgz"

# CADD's own pre-filter (--CADD-gnomadAF-threshold/--CADD-CLNSIG-filter) --
# independent of gnomad_af_threshold/clnsig_filter above (which drive the
# FINAL overall variant filter). Defaulted to match gnomad_af_threshold/
# clnsig_filter out of the box, but changeable separately -- e.g. to run
# CADD on a broader variant set than your final output filter. Mirrors how
# spliceai_gnomad_af_threshold/spliceai_clnsig_filter below already work
# for SpliceAI's own pre-filter.
cadd_gnomad_af_threshold: 0.01
cadd_clnsig_filter:
  - "Benign"
  - "Likely_benign"
  - "Benign/Likely_benign"
cadd_threshold:         15   # final CADD PHRED filter

# Pre-filter threshold for which variants SpliceAI actually gets run on
# (--SpliceAI-gnomadAF-threshold/--SpliceAI-CLNSIG-filter in
# compile_variants.py -- see _gnomad_clnsig_filter_mask). These keys are
# independent of gnomad_af_threshold/clnsig_filter above, defaulted to
# match out of the box, but changeable separately (e.g. run SpliceAI on a
# broader variant set than CADD/the final filter).
spliceai_gnomad_af_threshold: 0.01
spliceai_clnsig_filter:
  - "Benign"
  - "Likely_benign"
  - "Benign/Likely_benign"
spliceai_threshold:     0.2   # final SpliceAI score filter

# compile_variants.py's filtering thresholds. gnomad_af_threshold and
# clnsig_filter drive the FINAL overall variant filter (--final-gnomadAF-threshold/
# --final-CLNSIG-filter, always driven directly by these two keys).
gnomad_af_threshold:    0.01
clnsig_filter:
  - "Benign"
  - "Likely_benign"
  - "Benign/Likely_benign"

# compile_variants.py's final-stage depth/allele-frequency filters. Empty
# string ("") means "don't apply this filter" (compile_variants.py's own
# argparse default is None/unset) -- set a number to enable it.
final_dp_threshold: ""
final_af_threshold: ""

# ---------------------------------------------------------------------------
# Read phasing (rules/phase_reads.smk)
# Builds a merged VCF from all four callers, then runs WhatsHap-based
# per-gene phasing.
# ---------------------------------------------------------------------------
# phase_reads.py: min proportion of a read's max/expected coverage that
# must phase to haplotypes for it to be used at all. (Was previously a
# hardcoded script default, not passed by any rule -- now exposed here.)
phasing_threshold:      0.5

# phase_reads.py: proportion of a read's length from its terminus within
# which a variant is considered "terminal" (and treated with more caution
# during phasing, since terminal variants are more error-prone).
terminal_variant_proportion: 0.5

# phase_reads.py: minimum distance (bp) a variant must be from a read's end
# to be used for phasing at all.
min_dist_from_read_end_variant_phasing: 20

# ---------------------------------------------------------------------------
# Allele-specific expression analysis (rules/ase_analysis.smk)
# Binomial test for ASE per gene from phased haplotype counts.
# ---------------------------------------------------------------------------
# Shared with junction_analysis.smk and cohort_junction_analysis.smk below.
sample_coverage_threshold: 20
# Shared with junction_analysis.smk, cohort_junction_analysis.smk, and
# merge_hits.smk (as the padj:delta pair for outlier calling) below.
padj_threshold:         0.05
haplotype_ratio_threshold: 0.1

# detect_ase_outliers.py: min fraction of max coverage phased to haplotypes
# for an ASE call to be trusted. (Was previously a hardcoded script
# default, not passed by any rule -- now exposed here. Notably lower by
# default than jxn_phasing_threshold/cohort_jxn_phasing_threshold below.)
ase_phasing_threshold:  0.5

# ---------------------------------------------------------------------------
# Splice junction outlier analysis vs. GTEx reference tissues
# (rules/junction_analysis.smk)
# ---------------------------------------------------------------------------
gtex_data_dir: "resources/gtex_data"
gtex_coverage_threshold:   20
gtex_n_threshold:          100
# Shared with cohort_junction_analysis.smk below (as delta_psi_threshold).
delta_psi_threshold:    0.1

# perform_splice_junction_beta_binomial_tests.py: min fraction of bulk
# coverage a junction's hap1+hap2 must reach to be trusted. (Was previously
# a hardcoded script default, not passed by any rule -- now exposed here.)
jxn_phasing_threshold:  0.8

# ---------------------------------------------------------------------------
# Cohort-level junction outlier analysis (rules/cohort_junction_analysis.smk)
# Fits per-junction Beta distributions across a (bed, sample_type) group's
# own bulk BAMs (rather than against GTEx reference tissues -- see
# junction_analysis.smk above for that), then flags per-sample outliers
# using padj_threshold/delta_psi_threshold above as the padj:delta pair.
# ---------------------------------------------------------------------------
cohort_jxn_phasing_threshold: 0.8   # min fraction of bulk coverage a junction's hap1+hap2 must reach to be trusted
cohort_jxn_n_threshold:        30   # min number of bulk samples with usable coverage before fitting a junction's Beta distribution
cohort_jxn_min_reads:          20   # a junction needs >= this many reads in >=1 bulk sample to be tested at all

# ---------------------------------------------------------------------------
# Cross-sample merge stage (rules/merge_hits.smk)
# ---------------------------------------------------------------------------
merged_outdir: ""   # top-level directory for cross-sample merged results; one
                     # subdirectory per (bed, sample_type) group is created beneath it
omim_file: "resources/omim_data/OMIM.tsv"

merge_num_callers_threshold_snv:       2
merge_num_callers_threshold_indel:     2
merge_min_dp_snv:                     20
merge_min_dp_indel:                   20
merge_variant_sample_fraction:         0.05   # a variant present in > this fraction of a group's samples is dropped

merge_min_haplotype_ratio:             0.1
merge_delta_haplotype_ratio_threshold: 0.2
merge_ase_padj_threshold:              0.001
merge_ase_sample_fraction:             0.05   # a gene with ASE in > this fraction of a group's samples is dropped

merge_jxn_coverage_threshold:         50
merge_jxn_padj_threshold:              0.001
merge_delta_psi_threshold:             0.2
merge_jxn_sample_fraction:              0.01  # a junction that's an outlier in > this fraction of a group's samples is dropped

# ---------------------------------------------------------------------------
# Sample-type validation stage (rules/validate_sample_types.smk)
# Compares each (bed, sample_type) group's junction profile against GTEx
# reference-tissue matrices to flag any mislabeled sample_type.
# ---------------------------------------------------------------------------
validate_ref_tissues: ["fibroblasts", "lymphocytes", "wholeblood"]
validate_ref_colors:  ["#D95D5B", "#57AA3E", "#B271AB"]

# Optional: explicit color per sample_type for validate_sample_types plots.
# Any sample_type not listed here gets a color auto-assigned from a default
# palette (see sample_type_color() in the Snakefile).
sample_type_colors:
  fibroblasts: "#D95D5B"
  lymphocytes: "#57AA3E"
  PBMCs: "#4C8FCA"
  wholeblood: "#B271AB"

# ---------------------------------------------------------------------------
# Resource defaults (override per rule if needed)
# ---------------------------------------------------------------------------
threads: 8
time:    1440   # default runtime in MINUTES, used as resources.runtime in each rule
                # (converted to HH:MM:SS for sbatch --time inside the --cluster
                # template in submit_snakemake.sh)

# Node exclusion is applied uniformly via the --cluster sbatch template in
# submit_snakemake.sh (EXCLUDE_NODES variable), not from this config file.